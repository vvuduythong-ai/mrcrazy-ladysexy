<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr Crazy &amp; Lady Sexy · Meta Ads Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Password gate -->
  <div id="gate" class="gate">
    <form id="gateForm" class="gate-card" autocomplete="off">
      <h1>MR CRAZY &amp; LADY SEXY</h1>
      <p class="muted">Meta Ads Dashboard</p>
      <input id="pwd" type="password" placeholder="Mật khẩu" aria-label="Mật khẩu" />
      <button type="submit">Mở dashboard</button>
      <p id="gateErr" class="error" hidden>Sai mật khẩu.</p>
    </form>
  </div>

  <!-- App -->
  <div id="app" hidden>
    <header class="topbar">
      <div class="brand">Mr Crazy &amp; Lady Sexy <span class="muted">· Meta Ads</span></div>
      <div class="controls">
        <select id="range" aria-label="Khoảng thời gian">
          <option value="today">Hôm nay</option>
          <option value="yesterday">Hôm qua</option>
          <option value="7d" selected>7 ngày qua</option>
          <option value="14d">14 ngày qua</option>
          <option value="30d">30 ngày qua</option>
          <option value="this_month">Tháng này</option>
          <option value="last_month">Tháng trước</option>
          <option value="custom">Tùy chọn…</option>
        </select>
        <span id="customRange" class="custom-range" hidden>
          <input id="from" type="date" aria-label="Từ ngày" />
          <span class="custom-range-sep">→</span>
          <input id="to" type="date" aria-label="Đến ngày" />
        </span>
        <button id="refresh" title="Tải lại">↻</button>
        <button id="logout" title="Khoá">⎋</button>
      </div>
    </header>

    <main id="main">
      <div id="status" class="status" hidden></div>
      <section id="view"></section>
    </main>

    <footer class="foot muted">
      <span id="genAt"></span> · KPI: cost/tin nhắn ≤ <span id="kpiTarget">80.000₫</span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="recommend.js"></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
